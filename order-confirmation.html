<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Confirmation</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="order-confirmation.css" />
  </head>
  <body>
    <div class="confirm-container">
      <i class="fa-solid fa-circle-check confirm-icon"></i>

      <h1>Order Confirmed!</h1>
      <p class="confirm-msg">
        Thank you for your purchase. Your order has been successfully placed.
      </p>

      <div class="order-summary-box">
        <h3>Order Summary</h3>
        <div class="order-items"></div>
        <p class="order-total"></p>
      </div>

      <a href="index.html" class="back-home-btn">Continue Shopping</a>
    </div>

    <script type="module" src="./modules/order-confirmation.js"></script>
  </body>
</html>
